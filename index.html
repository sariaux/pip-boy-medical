<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pip-Boy Médical</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pip-boy">
        <header>
            <h1>PIP-BOY 3000 MARK IV</h1>
            <p>Système de Diagnostic Médical</p>
            <nav class="tabs">
                <button class="tab-btn active" data-tab="analyse">Analyse</button>
                <button class="tab-btn" data-tab="historique">Historique</button>
                <button class="tab-btn" data-tab="map">Map</button>
                <button class="tab-btn" data-tab="musique">Radio</button>
            </nav>
        </header>
        <main>
            <section class="tab-content active" id="analyse-tab">
                <div class="photo-corps" id="photo-corps" hidden>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/8e/Human_body_anterior_view.png" alt="Photo du corps humain" />
                </div>
                <section class="input-section">
                    <label for="symptoms">Décrivez votre douleur :</label>
                    <textarea id="symptoms" placeholder="Ex: mal au pied comme une brûlure"></textarea>
                    <label for="ai-mode">Mode IA :</label>
                    <select id="ai-mode" aria-label="Mode IA">
                        <option value="gratuit" selected>IA locale gratuite</option>
                        <option value="simulation">Simulation basique</option>
                    </select>
                    <button id="submit-btn">Analyser</button>
                    <div id="alert" class="alert" aria-live="polite"></div>
                </section>
                <section class="output-section">
                    <h2>Résultats de l'Analyse</h2>
                    <pre id="response"></pre>
                </section>
            </section>
            <section class="tab-content" id="historique-tab">
                <h2>Historique des Analyses</h2>
                <ul id="history" class="history"></ul>
            </section>
            <section class="tab-content" id="map-tab">
                <h2>Map</h2>
                <a href="https://www.google.fr/maps" target="_blank" id="plan-btn">Plan</a>
            </section>
        </main>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
